source = ~/.cache/wal/colors-hyprland.conf

xwayland {
    force_zero_scaling = true
}

monitor=eDP-1,1920x1080@60.01Hz,0x0,1

$terminal = kitty
$fileManager = nautilus
$menu = rofi

exec-once = swaync
exec-once = QML2_IMPORT_PATH=~/.config/quickshell/dynamic_island quickshell -p ~/.config/quickshell/dynamic_island/shell.qml
exec-once = sh -c 'if ! pgrep -x awww-daemon >/dev/null; then awww-daemon >/dev/null 2>&1 & sleep 1; fi; awww img /home/dan/.config/hypr/wallpaper.png'
exec-once = fcitx5 -d
exec-once = waypaper --restore
exec-once = hypridle
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Adwaita-dark'
exec-once = [workspace special:scratchpad silent] kitty --class kitty-scratchpad

blur-method = gaussian
blur-strength = 15

layerrule = blur on, ignore_alpha 0.5, match:namespace rofi
layerrule = blur on, ignore_alpha 0.1, match:namespace swaync-notification-window

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24
env = QT_IM_MODULE,fcitx
env = GTK_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx
env = SDL_IM_MODULE,fcitx
env = GLFW_IM_MODULE,ibus
env = QT_QPA_PLATFORMTHEME,qt5ct
env = GTK_THEME,Adwaita:dark
env = GTK_APPLICATION_PREFER_DARK_THEME,1
env = QT_STYLE_OVERRIDE,kvantum

permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

general {
    gaps_in = 5
    gaps_out = 3, 10, 10, 10
    border_size = 0
    col.active_border = $color4
    col.inactive_border = $color0
    resize_on_border = false
    allow_tearing = true
    layout = dwindle
}

decoration {
    rounding = 15
    rounding_power = 4
    active_opacity = 1
    inactive_opacity = 1

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(444444aa)
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = false
        vibrancy = 0.1696
        special = false
    }
}

cursor {
    no_hardware_cursors = false
}

animations {
    enabled = yes

    bezier = easeOutQuint,   0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0, 0, 1, 1
    bezier = almostLinear,   0.5, 0.5, 0.75, 1
    bezier = quick,          0.15, 0, 0.1, 1
    bezier = myBezier,       0.05, 0.9, 0.1, 1.05
    bezier = moveCurve,      0.16, 1, 0.3, 1
    bezier = popCurve,       0.22, 1, 0.36, 1

    animation = global, 1, 10, default
    animation = windowsIn, 1, 5, popCurve, slide bottom
    animation = windowsOut, 1, 4, easeOutQuint, slide bottom
    animation = windowsMove, 1, 5, moveCurve
    animation = border, 1, 4, easeOutQuint
    animation = fadeIn, 1, 3, almostLinear
    animation = fadeOut, 1, 3, almostLinear
    animation = fade, 1, 4, quick
    animation = layers, 1, 4, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 3, easeOutQuint, fade
    animation = workspaces, 1, 5, myBezier, slide
    animation = specialWorkspace, 1, 8, myBezier, slidevert
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}

input {
    kb_layout = us
    accel_profile = flat
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

$mainMod = SUPER

bind = $mainMod, K, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%F_%T).png && notify-send "Success"

bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, /home/dan/.local/bin/powermenu
bind = $mainMod, E, exec, nautilus
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, slash, exec, rofi -show drun -show-icons -theme /home/dan/.config/rofi/config_app_luancher.rasi
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, W, exec, /home/dan/.local/bin/wallpaper-switch.sh
bind = $mainMod, TAB, exec, qs ipc -p /home/dan/.config/quickshell/dynamic_island/shell.qml call overview toggle

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, grave, togglespecialworkspace, scratchpad
bind = $mainMod, F, togglespecialworkspace, fullScreen

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindel = , XF86MonBrightnessUp, exec, brightnessctl set 1%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 1%-
bind = , F3, exec, brightnessctl set 1%+
bind = , F2, exec, brightnessctl set 1%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = kitty-scratchpad-rules
    match:class = ^(kitty-scratchpad)$
    float = true
    workspace = special:scratchpad silent
    size = 80% 55%
    move = 10% 40
    rounding = 14
    opacity = 0.90 0.90
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}
